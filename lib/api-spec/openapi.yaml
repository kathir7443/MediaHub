openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: MediaHub API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: media
    description: Media download operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /media/info:
    post:
      operationId: fetchMediaInfo
      tags: [media]
      summary: Fetch media metadata and available formats
      description: Fetches title, thumbnail, duration, channel, upload date, and all available download formats for a given URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaInfoInput"
      responses:
        "200":
          description: Media metadata and formats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaInfo"
        "400":
          description: Invalid URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          description: Unsupported platform or private content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: string
    MediaInfoInput:
      type: object
      required: [url]
      properties:
        url:
          type: string
          description: YouTube or Instagram URL to fetch media info for
    MediaInfo:
      type: object
      required: [title, thumbnail, duration, channel, uploadDate, platform, videoFormats, audioFormats]
      properties:
        title:
          type: string
        thumbnail:
          type: string
          description: Thumbnail URL
        duration:
          type: integer
          description: Duration in seconds
        channel:
          type: string
          description: Channel or creator name
        uploadDate:
          type: ["string", "null"]
          description: Upload date string (YYYYMMDD or formatted)
        platform:
          type: string
          description: Detected platform (youtube, instagram)
        videoFormats:
          type: array
          items:
            $ref: "#/components/schemas/VideoFormat"
        audioFormats:
          type: array
          items:
            $ref: "#/components/schemas/AudioFormat"
    VideoFormat:
      type: object
      required: [formatId, quality, ext, needsMerge]
      properties:
        formatId:
          type: string
        quality:
          type: string
          description: Quality label e.g. 2160p, 1080p, 720p
        height:
          type: ["integer", "null"]
        width:
          type: ["integer", "null"]
        ext:
          type: string
          description: File extension e.g. mp4, webm
        filesize:
          type: ["integer", "null"]
          description: Estimated file size in bytes
        fps:
          type: ["integer", "null"]
          description: Frames per second
        vcodec:
          type: ["string", "null"]
          description: Video codec e.g. avc1, vp9, av01
        acodec:
          type: ["string", "null"]
          description: Audio codec if muxed, null for video-only streams
        needsMerge:
          type: boolean
          description: True when this is a video-only stream that requires FFmpeg merging with audio
        tbr:
          type: ["number", "null"]
          description: Total bitrate in kbps
    AudioFormat:
      type: object
      required: [formatId, label, ext, isConversion]
      properties:
        formatId:
          type: string
        label:
          type: string
          description: e.g. MP3 320kbps, Original (m4a)
        ext:
          type: string
        filesize:
          type: ["integer", "null"]
        abr:
          type: ["number", "null"]
          description: Audio bitrate in kbps
        acodec:
          type: ["string", "null"]
          description: Original audio codec
        isConversion:
          type: boolean
          description: True if this format requires FFmpeg conversion (e.g. to MP3)
        conversionAbr:
          type: ["integer", "null"]
          description: Target bitrate for MP3 conversion
